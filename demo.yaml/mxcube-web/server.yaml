---

server:
  SECRET_KEY: ASECRETKEY
  SECURITY_PASSWORD_SALT: ASALT
  PERMANENT_SESSION_LIFETIME: 60
  CERT: ADHOC

  DEBUG: false

  ALLOWED_CORS_ORIGINS:
    - "https://id30b.mxcube.esrf.fr"
    - "wss://id30b.mxcube.esrf.fr"
    - "https://id30b-video.mxcube.esrf.fr"
    - "wss://id30b-video.mxcube.esrf.fr"
    - "https://id30b-video.mxcube.esrf.fr"
  HOST: "0.0.0.0"
  PORT: 8081
  USER_DB_PATH: /tmp/mxcube-user.db

  RATELIMIT_DEFAULT: "150000 per day;6000 per hour;15 per minute"

sso:
  USE_SSO: false
  ISSUER: https://websso.[site].[com]/realms/[site]/
  LOGOUT_URI: ""
  TOKEN_INFO_URI: ""
  CLIENT_SECRET: ASECRETKEY
  CLIENT_ID: mxcube
  SCOPE: openid email profile
  CODE_CHALLANGE_METHOD: S256

mxcube:
  USE_EXTERNAL_STREAMER: True
  VIDEO_FORMAT: MPEG1
  VIDEO_STREAM_URL: "wss://id30b-video.mxcube.esrf.fr/ws"

  # At which port to stream from
  VIDEO_STREAM_PORT: 8000

  # Start OAV stream from MXCuBE process
  MXCUBE_STARTS_VIDEO_STREAM: true

  # Mode, SSX-CHIP, SSX-INJECTOR, OSC
  mode: OSC

  # Interval with which request to refresh token is made
  # by the client application.
  SESSION_REFRESH_INTERVAL: 9000

  # This is used to determine whether we can get samples from the sample changer
  # if false, Only LIMS samples will be available to fetch for the sample list
  USE_GET_SAMPLES_FROM_SC: true

  # Sync samples with LIMS on proposal selection
  AUTOSYNC_LIMS: false

  usermanager:
    class: UserManager
    inhouse_is_staff: true
    users:
      - username: opid291
        role: staff

argus:
  USE_ARGUS: false
  STREAM_PROXY_URL: "ws://localhost:7000/ws"

braggy:
  BRAGGY_URL: ""
  USE_BRAGGY: false
