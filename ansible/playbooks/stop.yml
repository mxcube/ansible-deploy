---
# Playbook to stop MXCubeWeb services

- name: Stop MXCubeWeb services
  hosts: mxcube_vms
  become: true

  tasks:
    - name: Stop MXCubeWeb service
      ansible.builtin.systemd:
        name: "mxcubeweb-{{ vm_context }}"
        state: stopped

    - name: Stop BLISS session service
      ansible.builtin.systemd:
        name: "bliss-session-{{ vm_context }}"
        state: stopped
      ignore_errors: true
      when: use_bliss | default(false)

    - name: Stop BLISS server service
      ansible.builtin.systemd:
        name: "bliss-server-{{ vm_context }}"
        state: stopped
      ignore_errors: true
      when: use_bliss | default(false)

    # Kill stale BLISS shell sessions not managed by systemd
    # (tmux-based sessions that may outlive the systemd services)
    - name: Kill stale BLISS shell sessions
      ansible.builtin.shell: pkill -f "bliss.shell.main" || true
      ignore_errors: true
      when: use_bliss | default(false)

    - name: Kill any remaining process holding BLISS REST port
      ansible.builtin.shell: fuser -k {{ bliss_rest_port }}/tcp || true
      ignore_errors: true
      when: use_bliss | default(false)

    - name: Display service status
      ansible.builtin.systemd:
        name: "mxcubeweb-{{ vm_context }}"
      register: service_status

    - name: Show service information
      ansible.builtin.debug:
        msg:
          - "Service: mxcubeweb-{{ vm_context }}"
          - "Status: {{ service_status.status.ActiveState }}"
